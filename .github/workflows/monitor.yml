name: Monitor TPC Supporter Count

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch page and check count
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHANGE_THRESHOLD: "10"
        run: |
          # Fetch the page with curl
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: nl-NL,nl;q=0.9,en;q=0.8" \
            --compressed \
            "https://theprivacycollective.nl/applovin-home/" -o page.html

          echo "Page size: $(wc -c < page.html) bytes"
          echo "Looking for counter..."
          grep -oP '[\d.]+\s*STEUNBETUIGINGEN' page.html || echo "Pattern not found, showing page start:"
          head -c 3000 page.html

          # Parse and compare with Python
          python3 << 'PYEOF'
          import re, os, json
          from datetime import datetime, timezone
          import urllib.request

          with open("page.html") as f:
              html = f.read()

          # Find the counter
          match = re.search(r"([\d.]+)\s*STEUNBETUIGINGEN", html, re.IGNORECASE)
          if not match:
              match = re.search(r"([\d.]+)\s*steunbetuigingen", html)
          if not match:
              print("ERROR: Could not find counter in page")
              print("First 2000 chars:", html[:2000])
              exit(1)

          raw = match.group(1)
          current = int(raw.replace(".", ""))
          print(f"Found count: {current:,}")

          # Load previous data
          data = {"count": None, "history": []}
          if os.path.exists("data.json"):
              with open("data.json") as f:
                  data = json.load(f)

          previous = data.get("count")
          threshold = int(os.environ.get("CHANGE_THRESHOLD", "10"))
          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          print(f"[{now}] Current: {current:,} | Previous: {previous}")

          data.setdefault("history", [])
          data["history"].append({"time": now, "count": current})
          data["history"] = data["history"][-500:]

          if previous is not None:
              diff = current - previous
              if abs(diff) >= threshold:
                  direction = "📈 UP" if diff > 0 else "📉 DOWN"
                  msg = f"{direction} by {abs(diff):,}!\nTPC AppLovin steunbetuigingen: {previous:,} → {current:,}\nTime: {now}\nhttps://theprivacycollective.nl/applovin-home/"
                  print(msg)

                  webhook = os.environ.get("DISCORD_WEBHOOK")
                  if webhook:
                      payload = json.dumps({"content": msg}).encode("utf-8")
                      req = urllib.request.Request(webhook, data=payload, headers={"Content-Type": "application/json"}, method="POST")
                      urllib.request.urlopen(req, timeout=15)
                      print("Discord sent")

                  token = os.environ.get("TELEGRAM_TOKEN")
                  chat_id = os.environ.get("TELEGRAM_CHAT_ID")
                  if token and chat_id:
                      url = f"https://api.telegram.org/bot{token}/sendMessage"
                      payload = json.dumps({"chat_id": chat_id, "text": msg}).encode("utf-8")
                      req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
                      urllib.request.urlopen(req, timeout=15)
                      print("Telegram sent")
              else:
                  print(f"Change of {diff:,} below threshold ({threshold})")
          else:
              print(f"First run. Baseline: {current:,}")

          data["count"] = current
          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

      - name: Commit updated data
        run: |
          git config user.name "TPC Monitor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update count $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

