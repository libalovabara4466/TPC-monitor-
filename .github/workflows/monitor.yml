name: Monitor TPC Supporter Count

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch page and check count
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import re, os, json
          from datetime import datetime, timezone
          import urllib.request
          from playwright.sync_api import sync_playwright

          print("Launching browser...")
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto("https://theprivacycollective.nl/applovin-home/", timeout=60000)

              try:
                  page.wait_for_selector("text=STEUNBETUIGINGEN", timeout=30000)
                  print("Counter element found!")
              except:
                  print("Timeout waiting for counter, trying anyway...")

              page.wait_for_timeout(3000)
              html = page.content()
              browser.close()

          print(f"Page loaded, {len(html)} chars")

          match = re.search(r"([\d.]+)\s*STEUNBETUIGINGEN", html, re.IGNORECASE)
          if not match:
              match = re.search(r">([\d.]{3,})<.*?STEUNBETUIGINGEN", html, re.IGNORECASE | re.DOTALL)
          if not match:
              for i, line in enumerate(html.split('\n')):
                  if 'steun' in line.lower():
                      print(f"Line {i}: {line.strip()[:200]}")
              exit(1)

          raw = match.group(1)
          current = int(raw.replace(".", ""))
          print(f"Found count: {current:,}")

          data = {"count": None, "history": []}
          if os.path.exists("data.json"):
              with open("data.json") as f:
                  data = json.load(f)

          previous = data.get("count")
          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          print(f"[{now}] Current: {current:,} | Previous: {previous}")

          data.setdefault("history", [])
          data["history"].append({"time": now, "count": current})
          data["history"] = data["history"][-500:]

          # Build the message
          if previous is not None and current != previous:
              diff = current - previous
              direction = "📈 UP" if diff > 0 else "📉 DOWN"
              msg = f"{direction} {abs(diff):,} | Steunbetuigingen: {current:,} (was {previous:,}) | {now}"
          else:
              msg = f"Steunbetuigingen: {current:,} | No change | {now}"

          print(msg)

          # Always send to Discord
          webhook = os.environ.get("DISCORD_WEBHOOK")
          if webhook:
              payload = json.dumps({"content": msg}).encode("utf-8")
              req = urllib.request.Request(webhook, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              urllib.request.urlopen(req, timeout=15)
              print("Discord sent")

          # Always send to Teams
          teams_url = os.environ.get("TEAMS_WEBHOOK")
          if teams_url:
              payload = json.dumps({
                  "type": "message",
                  "attachments": [{
                      "contentType": "application/vnd.microsoft.card.adaptive",
                      "content": {
                          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                          "type": "AdaptiveCard",
                          "version": "1.4",
                          "body": [{"type": "TextBlock", "text": msg, "wrap": True, "size": "Medium"}]
                      }
                  }]
              }).encode("utf-8")
              req = urllib.request.Request(teams_url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              urllib.request.urlopen(req, timeout=15)
              print("Teams sent")

          # Always send to Telegram
          tg_token = os.environ.get("TELEGRAM_TOKEN")
          tg_chat = os.environ.get("TELEGRAM_CHAT_ID")
          if tg_token and tg_chat:
              url = f"https://api.telegram.org/bot{tg_token}/sendMessage"
              payload = json.dumps({"chat_id": tg_chat, "text": msg}).encode("utf-8")
              req = urllib.request.Request(url, data=payload, headers={"Content-Type": "application/json"}, method="POST")
              urllib.request.urlopen(req, timeout=15)
              print("Telegram sent")

          data["count"] = current
          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

      - name: Commit updated data
        run: |
          git config user.name "TPC Monitor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update count $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
